<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登録フォーム</title>
    <link rel="stylesheet" href="register-style.css">
</head>
<body>
    <p>必要事項を入力の上、送信ボタンを押してください。</p>

    <form action="#">
        <table>
            <tr>
                <th>ID <span class="h">必須</span><span class="komoji">（メールアドレス）</span></th>
                <td><input type="email" name="mail" placeholder="例：xxx@morijyobi.ac.jp" size="30" required></td>
            </tr>
            
            <tr>
                <th>パスワード <span class="h">必須</span><span class="komoji">（半角英数字８文字以上）</span></th>
                <td><input type="password" name="pass" size="30" minlength="8" required>
                <label><input type="checkbox" name="pass_h">パスワードを表示する</label></td>
            </tr>
    
            <tr>
                <th>氏名 <span class="h">必須</span></th>
                <td>姓：<input type="text" name="sei" placeholder="例：盛岡" required>
                    　名：<input type="text" name="mei" placeholder="例：太郎" required></td>
            </tr>
            
            <tr>
                <th>住所</th>
                <td>〒<input type="text" name="yb" value="020-0021" size="8" readonly><br>
                    <input type="text" name="kenn" value="岩手県盛岡市中央通３丁目" readonly><br>
                    <input type="text" name="bann" placeholder="番地"><br>
                    <input type="text" name="tatemono" placeholder="建物名" size="30"></td>
            </tr>
        
            <tr>
                <th>携帯電話番号 <span class="h">必須</span><span class="komoji">（ハイフンなし）</span></th>
                <td><input type="tel" name="tel" required></td>
            </tr>
    
            <tr>
                <th>学科・学年 <span class="h">必須</span></th>
                <td><select name="gakka" required>
                    学科:<option value="">学科を選択してください</option>
                    <option value="s">システム系学科</option>
                    <option value="b">ビジネス系学科</option>
                    <option value="d">デザイン系学科</option>
                </select>
                <select name="gakunenn" required>
                    学年:<option value="">学年を選択してください</option>
                    <option value="1">1年</option>
                    <option value="2">2年</option>
                    <option value="3">3年</option>
                    <option value="4">4年</option>
                </select></td>
            </tr>
            
            <tr>
                <th>お得な情報・クーポン <span class="h">必須</span></th>
                <td>
                    <label><input type="radio" name="otoku" value="1" required>受け取る</label>
                    <label><input type="radio" name="otoku" value="2">受け取らない</label>
                </td>
            </tr>
    
            <tr>
                <th>ご意見・ご要望<span class="komoji">（200字以内でご記入ください）</span></th>
                <td><textarea name="iken" cols="50" rows="10" maxlength="200"></textarea><br></td>
            </tr>
        </table>
            
        <button type="reset">入力内容をクリアする</button>
        <button type="submit">送信</button>
    </form>
</body>
    
</html>
